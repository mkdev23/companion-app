<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Companion Avatar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    canvas { display: block; width: 100% !important; height: 100% !important; }
    #status {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.4); font-family: sans-serif; font-size: 11px;
      pointer-events: none; display: none;
    }
  </style>
</head>
<body>
  <div id="status">Loading avatar...</div>

  <!-- Three.js r168 + @pixiv/three-vrm 3.x via CDN -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/",
      "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.1.0/lib/three-vrm.module.js",
      "@pixiv/three-vrm-core": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-core@3.1.0/lib/three-vrm-core.module.js",
      "@pixiv/three-vrm-springbone": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-springbone@3.1.0/lib/three-vrm-springbone.module.js",
      "@pixiv/three-vrm-materials-mtoon": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-materials-mtoon@3.1.0/lib/three-vrm-materials-mtoon.module.js",
      "@pixiv/three-vrm-node-constraint": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-node-constraint@3.1.0/lib/three-vrm-node-constraint.module.js"
    }
  }
  </script>
  <script type="module" src="avatar.js"></script>
</body>
</html>
